<!DOCTYPE html>
<!--
  easy-xml — Android UI 草图工具 / Android UI sketch tool
  单页 HTML，无需构建。在浏览器中打开即可使用。
  Single-page HTML, no build step. Just open in a browser.
-->
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>easy-xml · Android UI Sketch</title>
<style>
  :root {
    --bg: #1e1f24;
    --panel: #26282f;
    --panel-2: #2e3038;
    --border: #3a3d47;
    --text: #e6e7ea;
    --muted: #9aa0ad;
    --accent: #5b9dff;
    --accent-2: #ffce5b;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* ---- Toolbar / 工具栏 ---- */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .group {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    border-right: 1px solid var(--border);
  }
  .group:last-child { border-right: none; }
  .group-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-right: 4px;
  }
  button.tool, .tool {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  button.tool:hover, .tool:hover { border-color: var(--accent); }
  .tool.draw { cursor: grab; }
  .tool.draw:active { cursor: grabbing; }
  .tool.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tool.vibe { background: #4a431f; border-color: var(--accent-2); color: var(--accent-2); }
  .tool.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #toolbar select, #toolbar input.num {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 6px; font-size: 12px;
  }
  #toolbar input.num { width: 54px; }
  input[type=color] { width: 30px; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: none; padding: 0; cursor: pointer; }
  input[type=range] { width: 80px; }
  /* ---- Main layout / 主布局 ---- */
  #main { flex: 1; display: flex; min-height: 0; }
  /* Page list / 页面列表 */
  #pages {
    width: 180px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px;
    flex-shrink: 0;
  }
  #pages h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; margin: 4px 4px 8px; letter-spacing: .5px; }
  .page-item {
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .page-item:hover { background: var(--panel-2); }
  .page-item.active { background: var(--panel-2); border-color: var(--accent); }
  .page-item .home-dot { color: var(--accent-2); font-size: 11px; }
  .page-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .page-item .pgmenu { color: var(--muted); font-size: 14px; padding: 0 2px; }
  .page-item .pgmenu:hover { color: var(--text); }
  /* Canvas / 画布 */
  #stage {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px;
    background:
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  #phone {
    background: #11131a;
    border-radius: 28px;
    padding: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    height: fit-content;
  }
  svg#canvas { background: #fafafa; border-radius: 16px; display: block; }
  /* Properties / 属性面板 */
  #props {
    width: 240px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #props h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; margin: 0 0 10px; letter-spacing: .5px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .field input[type=text], .field textarea, .field select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 8px;
    font-size: 13px;
    font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .row { display: flex; gap: 8px; align-items: center; }
  .empty-hint { color: var(--muted); font-size: 12px; line-height: 1.6; }
  .btn-danger { background: #3a2326; color: var(--danger); border: 1px solid var(--danger); border-radius: 6px; padding: 7px; width: 100%; cursor: pointer; font-size: 12px; }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  /* SVG element styling */
  .el { cursor: move; }
  .el.preview-link { cursor: pointer; }
  .sel-outline { fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 4 3; pointer-events: none; }
  .resize-handle { fill: var(--accent); cursor: nwse-resize; }
  .memo-card { cursor: move; }
  /* ---- Code view / 代码视图 ---- */
  #codeView { display: none; flex: 1; flex-direction: column; min-height: 0; }
  .code-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    background: var(--panel); font-size: 12px; color: var(--muted);
  }
  .code-toolbar .spacer { flex: 1; }
  .code-wrap { position: relative; flex: 1; min-height: 0; margin: 10px; }
  #codeHl, #codeArea {
    position: absolute; inset: 0; margin: 0; padding: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px; line-height: 1.55;
    white-space: pre-wrap; overflow-wrap: break-word; word-break: break-word;
    border: 1px solid var(--border); border-radius: 8px;
    overflow: auto; tab-size: 2;
  }
  #codeHl { background: #15161b; color: #d7dbe2; pointer-events: none; z-index: 1; }
  #codeHl code { font: inherit; white-space: inherit; }
  #codeArea { background: transparent; color: transparent; caret-color: #fff; z-index: 2; resize: none; }
  #codeArea::selection { background: rgba(91,157,255,.35); }
  /* syntax tokens / 语法着色 */
  .c  { color: #6a9955; font-style: italic; }
  .tg { color: #569cd6; }
  .at { color: #9cdcfe; }
  .vl { color: #ce9178; }
  .pu { color: #808080; }
  .hd { color: #e6c07b; font-weight: 600; }
  .fn { color: #707070; }
  /* mode visibility / 模式可见性 */
  body.mode-code #stage, body.mode-code #props { display: none; }
  body.mode-code #codeView { display: flex; }
  body.mode-preview #props { display: none; }
  /* toast */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--panel-2); border: 1px solid var(--accent); color: var(--text); padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body class="mode-visual">

<!-- ======== Toolbar / 工具栏 ======== -->
<div id="toolbar">
  <div class="group">
    <span class="group-label">控制 Control</span>
    <button class="tool" data-act="newpage">＋ 新页 New</button>
    <button class="tool" data-act="import">导入 Import</button>
    <button class="tool" data-act="export">导出 Export</button>
  </div>

  <div class="group">
    <span class="group-label">视图 View</span>
    <button class="tool" data-act="view" data-mode="visual">🎨 设计 Visual</button>
    <button class="tool" data-act="view" data-mode="code">{ } 代码 Code</button>
    <button class="tool" data-act="view" data-mode="preview">▶ 预览 Preview</button>
  </div>

  <div class="group">
    <span class="group-label">绘制 Draw</span>
    <div class="tool draw" draggable="true" data-type="rect">▭ 框 Frame</div>
    <div class="tool draw" draggable="true" data-type="textfield">▭ 输入 Textfield</div>
    <div class="tool draw" draggable="true" data-type="button">▢ 按钮 Button</div>
    <div class="tool draw" draggable="true" data-type="list">☰ 列表 List</div>
    <div class="tool draw" draggable="true" data-type="include" title="把另一页面作为元素嵌入 / Embed another page as an element">📦 嵌入 Include</div>
  </div>

  <div class="group">
    <span class="group-label">样式 Style</span>
    <input type="color" id="fillColor" value="#ffffff" title="颜色 Color">
    <input type="range" id="opacity" min="0" max="1" step="0.05" value="1" title="透明度 Opacity">
  </div>

  <div class="group">
    <span class="group-label">画面 Canvas</span>
    <select id="canvasPreset" title="预设尺寸 / Preset size"></select>
    <input type="number" id="canvasW" class="num" min="120" max="2000" title="宽 Width">
    <span style="color:var(--muted)">×</span>
    <input type="number" id="canvasH" class="num" min="120" max="4000" title="高 Height">
  </div>

  <div class="group">
    <span class="group-label">注释 Annotate</span>
    <div class="tool vibe draw" draggable="true" data-type="memo">💭 Vibe Memo</div>
    <button class="tool" data-act="link">🔗 Link</button>
    <button class="tool" id="toggleMemo" data-act="foldmemo">👁 折叠备忘 Memos</button>
  </div>
</div>

<!-- ======== Main / 主区域 ======== -->
<div id="main">
  <!-- Page list / 页面列表 -->
  <div id="pages">
    <h3>页面 Pages</h3>
    <div id="pageList"></div>
  </div>

  <!-- Canvas / 画布 -->
  <div id="stage">
    <div id="phone">
      <svg id="canvas" width="360" height="720" viewBox="0 0 360 720">
        <g id="elLayer"></g>
        <g id="memoLayer"></g>
        <g id="overlay"></g>
      </svg>
    </div>
  </div>

  <!-- Code editor / 代码编辑器 -->
  <div id="codeView">
    <div class="code-toolbar">
      <span>Markdown + XML（可编辑 / editable）</span>
      <span class="spacer"></span>
      <button class="tool primary" id="cApply">✓ 应用到设计 Apply</button>
      <button class="tool" id="cRegen">↻ 从设计重生成 Regenerate</button>
      <button class="tool" id="cCopy">📋 复制 Copy</button>
      <button class="tool" id="cDownload">⬇ 下载 .md</button>
    </div>
    <div class="code-wrap">
      <pre id="codeHl" aria-hidden="true"><code></code></pre>
      <textarea id="codeArea" spellcheck="false"></textarea>
    </div>
  </div>

  <!-- Properties / 属性面板 -->
  <div id="props">
    <h3>属性 Properties</h3>
    <div id="propBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">

<script>
"use strict";
// ====================================================================
// easy-xml — state & logic / 状态与逻辑
// ====================================================================
const STORE_KEY = "easy-xml-project-v1";

// Default element sizes / 默认尺寸
const DEFAULTS = {
  rect:      { w: 200, h: 130, text: "" },
  textfield: { w: 240, h: 46,  text: "Input..." },
  button:    { w: 140, h: 46,  text: "Button" },
  list:      { w: 260, h: 220, text: "Item" },
  include:   { w: 170, h: 130, text: "" },
};

// Canvas presets / 画面预设
const CANVAS_PRESETS = [
  { label: "Phone 360×720",   w: 360,  h: 720 },
  { label: "Phone 360×800",   w: 360,  h: 800 },
  { label: "Phone L 412×915", w: 412,  h: 915 },
  { label: "Compact 320×568", w: 320,  h: 568 },
  { label: "Tablet 800×1280", w: 800,  h: 1280 },
];

let project = null;        // { pages, activePageId, seq }
let selectedId = null;
let selectedKind = null;   // 'el' | 'memo'
let memoVisible = true;
let mode = "visual";       // 'visual' | 'code' | 'preview'
let codeDirty = false;     // code edited but not applied / 代码已改未应用

const SVGNS = "http://www.w3.org/2000/svg";
const $ = (sel) => document.querySelector(sel);
const canvas = $("#canvas");
const elLayer = $("#elLayer");
const memoLayer = $("#memoLayer");
const overlay = $("#overlay");

// ---- ID / 唯一ID ----
function nextId(prefix) {
  project.seq = (project.seq || 0) + 1;
  return prefix + project.seq;
}

// ---- Persistence / 持久化 (localStorage) ----
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(project)); }
  catch (e) { console.warn("save failed", e); }
}
function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) { project = JSON.parse(raw); return true; }
  } catch (e) { console.warn("load failed", e); }
  return false;
}
function activePage() {
  return project.pages.find(p => p.id === project.activePageId) || project.pages[0];
}
// active canvas size / 当前画面尺寸
function cw() { const p = activePage(); return (p && p.canvasW) || 360; }
function ch() { const p = activePage(); return (p && p.canvasH) || 720; }

// ---- Init / 初始化 ----
function freshProject() {
  project = { pages: [], activePageId: null, seq: 0 };
  const p = createPage("Home");
  p.isHome = true;
  project.activePageId = p.id;
}
function createPage(name) {
  const p = {
    id: nextId("p"),
    name: name || ("Page " + (project.pages.length + 1)),
    isHome: false, elements: [], memos: [],
    canvasW: 360, canvasH: 720,
  };
  project.pages.push(p);
  return p;
}
// fill defaults for old data / 兼容旧数据
function migrate() {
  if (!project.pages) return;
  project.pages.forEach(p => {
    if (!p.canvasW) p.canvasW = 360;
    if (!p.canvasH) p.canvasH = 720;
    if (!p.memos) p.memos = [];
    (p.elements || []).forEach(e => { if (e.note == null) e.note = ""; if (e.ref === undefined) e.ref = null; });
  });
}

// ====================================================================
// Rendering / 渲染
// ====================================================================
function render() {
  renderPageList();
  renderCanvas();
  renderProps();
  syncCanvasControls();
  save();
}

function syncCanvasControls() {
  const p = activePage();
  $("#canvasW").value = p.canvasW;
  $("#canvasH").value = p.canvasH;
  const preset = CANVAS_PRESETS.findIndex(x => x.w === p.canvasW && x.h === p.canvasH);
  $("#canvasPreset").value = preset >= 0 ? String(preset) : "custom";
}

function renderPageList() {
  const list = $("#pageList");
  list.innerHTML = "";
  project.pages.forEach(p => {
    const div = document.createElement("div");
    div.className = "page-item" + (p.id === project.activePageId ? " active" : "");
    div.innerHTML =
      `<span class="home-dot">${p.isHome ? "★" : ""}</span>` +
      `<span class="name">${escapeHtml(p.name)}</span>` +
      `<span class="pgmenu" title="操作 Menu">⋯</span>`;
    div.querySelector(".name").onclick = () => { project.activePageId = p.id; selectedId = null; render(); };
    div.querySelector(".home-dot").onclick = () => { project.activePageId = p.id; selectedId = null; render(); };
    div.querySelector(".pgmenu").onclick = (e) => { e.stopPropagation(); pageMenu(p); };
    list.appendChild(div);
  });
}

function pageMenu(p) {
  const action = prompt(
    `页面 Page: "${p.name}"\n\n` +
    `输入操作 / Type an action:\n` +
    `  r = 重命名 Rename\n` +
    `  h = 设为入口 Set as Home\n` +
    `  d = 删除 Delete`, "");
  if (action === null) return;
  const a = action.trim().toLowerCase();
  if (a === "r") {
    const n = prompt("新名称 / New name:", p.name);
    if (n) { p.name = n.trim(); render(); }
  } else if (a === "h") {
    project.pages.forEach(x => x.isHome = false);
    p.isHome = true; render();
  } else if (a === "d") {
    if (project.pages.length === 1) { toast("至少保留一个页面 / Keep at least one page"); return; }
    if (confirm(`删除 "${p.name}"? / Delete?`)) {
      project.pages = project.pages.filter(x => x.id !== p.id);
      // clear links / includes pointing here / 清除指向该页的链接与嵌入
      project.pages.forEach(pg => pg.elements.forEach(el => {
        if (el.linkTo === p.id) el.linkTo = null;
        if (el.ref === p.id) el.ref = null;
      }));
      if (project.activePageId === p.id) project.activePageId = project.pages[0].id;
      if (!project.pages.some(x => x.isHome)) project.pages[0].isHome = true;
      render();
    }
  }
}

function renderCanvas() {
  const page = activePage();
  const W = cw(), H = ch();
  canvas.setAttribute("width", W);
  canvas.setAttribute("height", H);
  canvas.setAttribute("viewBox", `0 0 ${W} ${H}`);

  elLayer.innerHTML = "";
  memoLayer.innerHTML = "";
  overlay.innerHTML = "";

  page.elements.forEach(el => elLayer.appendChild(buildElement(el)));
  memoLayer.style.display = memoVisible ? "" : "none";
  page.memos.forEach(m => memoLayer.appendChild(buildMemo(m)));

  if (selectedId && mode !== "preview") {
    const obj = findSelected();
    if (obj) drawSelection(obj.x, obj.y, obj.w || 200, obj.h || 80);
  }
}

// build a top-level (interactive) element / 构建可交互的顶层元素
function buildElement(el) {
  const g = document.createElementNS(SVGNS, "g");
  g.setAttribute("class", "el" + (mode === "preview" && el.linkTo ? " preview-link" : ""));
  g.setAttribute("transform", `translate(${el.x},${el.y})`);
  g.dataset.id = el.id;
  g.dataset.kind = "el";
  drawShapes(g, el, 0);

  // note badge / 注释标记
  if (el.note && el.note.trim()) {
    const n = document.createElementNS(SVGNS, "text");
    n.setAttribute("x", 5); n.setAttribute("y", 15);
    n.setAttribute("font-size", "12"); n.setAttribute("fill", "#caa53a");
    n.textContent = "📝";
    const ttl = document.createElementNS(SVGNS, "title");
    ttl.textContent = el.note; n.appendChild(ttl);
    g.appendChild(n);
  }
  // link badge / 链接标记
  if (el.linkTo) {
    const t = document.createElementNS(SVGNS, "text");
    t.setAttribute("x", el.w - 6); t.setAttribute("y", 16);
    t.setAttribute("text-anchor", "end"); t.setAttribute("font-size", "12");
    t.setAttribute("fill", "#5b9dff"); t.textContent = "🔗";
    g.appendChild(t);
  }
  return g;
}

// draw the shapes for an element into a group (local coords, no events)
// 把元素的形状画进一个分组（局部坐标，无事件）。depth 用于限制 include 递归。
function drawShapes(g, el, depth) {
  const stroke = "#3a3d47";
  const op = el.opacity != null ? el.opacity : 1;

  if (el.type === "rect") {
    rect(g, 0, 0, el.w, el.h, el.color, op, stroke, 8);
  } else if (el.type === "textfield") {
    rect(g, 0, 0, el.w, el.h, el.color, op, stroke, 6);
    label(g, 12, el.h / 2 + 4, el.text || "Input...", "#8a8f99", 14, "start");
  } else if (el.type === "button") {
    rect(g, 0, 0, el.w, el.h, el.color, op, stroke, 22);
    label(g, el.w / 2, el.h / 2 + 5, el.text || "Button", "#1d2330", 15, "middle", 600);
  } else if (el.type === "list") {
    rect(g, 0, 0, el.w, el.h, el.color, op, stroke, 8);
    const rows = Math.max(2, Math.floor(el.h / 44));
    for (let i = 1; i < rows; i++) { const ly = i * (el.h / rows); line(g, 0, ly, el.w, ly, "#e3e3e3"); }
    for (let i = 0; i < rows; i++) {
      const ly = i * (el.h / rows) + (el.h / rows) / 2 + 4;
      label(g, 14, ly, (el.text || "Item") + " " + (i + 1), "#4a4f59", 13, "start");
    }
  } else if (el.type === "include") {
    rect(g, 0, 0, el.w, el.h, "#eef2ff", op, "#5b9dff", 8);
    const ref = el.ref ? project.pages.find(p => p.id === el.ref) : null;
    label(g, 6, 14, "📦 " + (ref ? ref.name : "(未指定 page)"), "#3a6dd0", 11, "start", 600);
    if (ref && depth < 1) {
      // scaled snapshot of the referenced page / 引用页面的缩放快照
      const pad = 4, top = 18;
      const sc = Math.min((el.w - pad * 2) / (ref.canvasW || 360), (el.h - top - pad) / (ref.canvasH || 720));
      const inner = document.createElementNS(SVGNS, "g");
      inner.setAttribute("transform", `translate(${pad},${top}) scale(${sc})`);
      inner.setAttribute("pointer-events", "none");
      const bg = document.createElementNS(SVGNS, "rect");
      bg.setAttribute("width", ref.canvasW || 360); bg.setAttribute("height", ref.canvasH || 720);
      bg.setAttribute("fill", "#fafafa"); inner.appendChild(bg);
      (ref.elements || []).forEach(ce => {
        const cg = document.createElementNS(SVGNS, "g");
        cg.setAttribute("transform", `translate(${ce.x},${ce.y})`);
        drawShapes(cg, ce, depth + 1); // depth+1 → nested includes won't expand
        inner.appendChild(cg);
      });
      g.appendChild(inner);
    } else if (ref) {
      label(g, el.w / 2, el.h / 2 + 10, "(嵌套折叠 nested)", "#9aa0ad", 10, "middle");
    }
  }
}

function buildMemo(m) {
  const g = document.createElementNS(SVGNS, "g");
  g.setAttribute("class", "memo-card");
  g.setAttribute("transform", `translate(${m.x},${m.y})`);
  g.dataset.id = m.id; g.dataset.kind = "memo";
  const w = m.w || 180, h = m.h || 70;
  rect(g, 0, 0, w, h, "#fff4c2", 0.96, "#d9b94a", 6);
  const corner = document.createElementNS(SVGNS, "path");
  corner.setAttribute("d", `M${w-14},0 L${w},14 L${w-14},14 Z`);
  corner.setAttribute("fill", "#e0c45a");
  g.appendChild(corner);
  wrapText(g, 8, 18, m.text || "vibe...", w - 14, 13, "#5b4d12");
  return g;
}

// ---- SVG helpers / SVG 辅助 ----
function rect(parent, x, y, w, h, fill, op, stroke, r) {
  const e = document.createElementNS(SVGNS, "rect");
  e.setAttribute("x", x); e.setAttribute("y", y);
  e.setAttribute("width", w); e.setAttribute("height", h);
  e.setAttribute("rx", r || 0);
  e.setAttribute("fill", fill || "#ffffff");
  e.setAttribute("fill-opacity", op != null ? op : 1);
  e.setAttribute("stroke", stroke || "#3a3d47");
  e.setAttribute("stroke-width", "1.5");
  parent.appendChild(e);
}
function label(parent, x, y, txt, fill, size, anchor, weight) {
  const e = document.createElementNS(SVGNS, "text");
  e.setAttribute("x", x); e.setAttribute("y", y);
  e.setAttribute("fill", fill); e.setAttribute("font-size", size || 13);
  e.setAttribute("text-anchor", anchor || "start");
  if (weight) e.setAttribute("font-weight", weight);
  e.setAttribute("font-family", "sans-serif");
  e.textContent = txt;
  parent.appendChild(e);
}
function line(parent, x1, y1, x2, y2, color) {
  const e = document.createElementNS(SVGNS, "line");
  e.setAttribute("x1", x1); e.setAttribute("y1", y1);
  e.setAttribute("x2", x2); e.setAttribute("y2", y2);
  e.setAttribute("stroke", color); e.setAttribute("stroke-width", "1");
  parent.appendChild(e);
}
function wrapText(parent, x, y, txt, maxW, size, fill) {
  const words = String(txt).split(/\s+/);
  const charW = size * 0.6;
  const perLine = Math.max(1, Math.floor(maxW / charW));
  let line = "", ly = y, lines = 0;
  const flush = () => {
    const t = document.createElementNS(SVGNS, "text");
    t.setAttribute("x", x); t.setAttribute("y", ly);
    t.setAttribute("font-size", size); t.setAttribute("fill", fill);
    t.setAttribute("font-family", "sans-serif");
    t.textContent = line;
    parent.appendChild(t); ly += size + 3; lines++;
  };
  for (const w of words) {
    if ((line + " " + w).trim().length > perLine && line) { flush(); line = w; }
    else { line = (line + " " + w).trim(); }
    if (lines >= 4) break;
  }
  if (line && lines < 5) flush();
}

function drawSelection(x, y, w, h) {
  const o = document.createElementNS(SVGNS, "rect");
  o.setAttribute("class", "sel-outline");
  o.setAttribute("x", x - 2); o.setAttribute("y", y - 2);
  o.setAttribute("width", w + 4); o.setAttribute("height", h + 4);
  overlay.appendChild(o);
  const hd = document.createElementNS(SVGNS, "rect");
  hd.setAttribute("class", "resize-handle");
  hd.setAttribute("x", x + w - 5); hd.setAttribute("y", y + h - 5);
  hd.setAttribute("width", 12); hd.setAttribute("height", 12);
  hd.setAttribute("rx", 2);
  hd.dataset.handle = "resize";
  overlay.appendChild(hd);
}

// detect include cycle / 检测 include 循环
function wouldRecurse(includeEl, targetPageId, seen) {
  seen = seen || new Set();
  if (targetPageId === activePage().id) return true; // self
  if (seen.has(targetPageId)) return true;
  seen.add(targetPageId);
  const tp = project.pages.find(p => p.id === targetPageId);
  if (!tp) return false;
  return (tp.elements || []).some(e => e.type === "include" && e.ref && wouldRecurse(includeEl, e.ref, seen));
}

function deleteSelected() {
  const page = activePage();
  if (selectedKind === "memo") page.memos = page.memos.filter(m => m.id !== selectedId);
  else page.elements = page.elements.filter(e => e.id !== selectedId);
  selectedId = null; selectedKind = null;
  render();
}

// Flatten an include into copied primitive elements with computed coordinates.
// 把 include 焊接成带"算好坐标"的普通元素副本（类似 group 粘贴）。一次性、不再联动，绝对安全。
function flattenInclude(el) {
  const ref = el.ref && project.pages.find(p => p.id === el.ref);
  if (!ref) { toast("先选择嵌入页面 / Pick a page to embed first"); return; }
  const added = [];
  const visited = new Set();           // 防循环 / cycle guard
  function bake(srcPage, ox, oy, sc, depth) {
    if (!srcPage || depth > 8) return;
    (srcPage.elements || []).forEach(e => {
      if (e.type === "include") {       // resolve nested include recursively / 递归展开嵌套
        const rp = e.ref && project.pages.find(p => p.id === e.ref);
        if (rp && !visited.has(rp.id)) {
          visited.add(rp.id);
          const isc = sc * Math.min(e.w / (rp.canvasW || 360), e.h / (rp.canvasH || 720));
          bake(rp, ox + e.x * sc, oy + e.y * sc, isc, depth + 1);
          visited.delete(rp.id);
        }
        return;
      }
      added.push({
        id: nextId("e"), type: e.type,
        x: ox + e.x * sc, y: oy + e.y * sc, w: e.w * sc, h: e.h * sc,
        text: e.text || "", note: e.note || "",
        color: e.color || "#ffffff", opacity: e.opacity != null ? e.opacity : 1,
        linkTo: e.linkTo || null, ref: null,
      });
    });
  }
  const sc = Math.min(el.w / (ref.canvasW || 360), el.h / (ref.canvasH || 720));
  visited.add(ref.id);
  bake(ref, el.x, el.y, sc, 0);
  const page = activePage();
  page.elements = page.elements.filter(x => x.id !== el.id).concat(added);
  selectedId = null; selectedKind = null;
  render();
  toast(`已拍平为 ${added.length} 个元素 / Flattened into ${added.length} elements`);
}

function applyCanvasSize(w, h) {
  const p = activePage();
  p.canvasW = clamp(w, 120, 4000);
  p.canvasH = clamp(h, 120, 4000);
  render();
}

function addElement(type, x, y) {

// Interaction: move / resize on canvas / 画布上拖动与缩放
// ====================================================================
let drag = null;

canvas.addEventListener("pointerdown", (e) => {
  if (mode !== "visual") {
    // preview: follow link / 预览模式跳转
    if (mode === "preview") {
      const g = e.target.closest(".el");
      if (g) {
        const el = activePage().elements.find(x => x.id === g.dataset.id);
        if (el && el.linkTo && project.pages.some(p => p.id === el.linkTo)) {
          project.activePageId = el.linkTo; selectedId = null; render();
        }
      }
    }
    return;
  }
  if (e.target.dataset && e.target.dataset.handle === "resize") {
    const obj = findSelected();
    if (!obj) return;
    drag = { mode: "resize", obj, startX: e.clientX, startY: e.clientY, ow: obj.w, oh: obj.h };
    canvas.setPointerCapture(e.pointerId);
    return;
  }
  const g = e.target.closest(".el, .memo-card");
  if (!g) { selectedId = null; selectedKind = null; renderCanvas(); renderProps(); return; }
  selectedId = g.dataset.id; selectedKind = g.dataset.kind;
  const obj = findSelected();
  drag = { mode: "move", obj, startX: e.clientX, startY: e.clientY, ox: obj.x, oy: obj.y };
  canvas.setPointerCapture(e.pointerId);
  renderCanvas(); renderProps();
});

canvas.addEventListener("pointermove", (e) => {
  if (!drag) return;
  const scale = canvas.getBoundingClientRect().width / cw();
  const dx = (e.clientX - drag.startX) / scale;
  const dy = (e.clientY - drag.startY) / scale;
  if (drag.mode === "move") {
    drag.obj.x = clamp(drag.ox + dx, 0, cw() - (drag.obj.w || 180));
    drag.obj.y = clamp(drag.oy + dy, 0, ch() - (drag.obj.h || 70));
  } else if (drag.mode === "resize") {
    drag.obj.w = clamp(drag.ow + dx, 24, cw() - drag.obj.x);
    drag.obj.h = clamp(drag.oh + dy, 20, ch() - drag.obj.y);
  }
  renderCanvas();
});
canvas.addEventListener("pointerup", () => { if (drag) { drag = null; renderProps(); save(); } });

function clientToSvg(cx, cy) {
  const r = canvas.getBoundingClientRect();
  const scale = r.width / cw();
  return { x: (cx - r.left) / scale, y: (cy - r.top) / scale };
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ====================================================================
// Markdown <-> model / Markdown 与模型互转
// ====================================================================
function pageNameById(id) { const p = project.pages.find(x => x.id === id); return p ? p.name : "?"; }
function esc(s) { return String(s == null ? "" : s).replace(/"/g, "&quot;"); }
function r(n) { return Math.round(n); }

function buildMarkdown() {
  let md = "";
  md += "# Android UI Design / 安卓界面设计\n\n";
  md += "> 由 easy-xml 生成的界面草图。请据此实现 Android UI。\n";
  md += "> UI sketch generated by easy-xml. Please implement the Android UI accordingly.\n\n";

  const home = project.pages.find(p => p.isHome);
  if (home) md += `<!-- [HOME: ${home.name}] -->\n\n`;

  project.pages.forEach(p => {
    md += `<!-- [PAGE: ${p.name}] -->\n`;
    md += `## ${p.name}${p.isHome ? " (Home)" : ""}\n\n`;
    md += "```xml\n";
    md += `<screen name="${esc(p.name)}"${p.isHome ? ' home="true"' : ""} width="${p.canvasW}" height="${p.canvasH}">\n`;
    p.elements.forEach(el => {
      if (el.note && el.note.trim()) {
        md += `  <!-- ${el.note.replace(/\r?\n/g, " ").replace(/--+/g, "—").trim()} -->\n`;
      }
      let attrs;
      if (el.type === "include") {
        attrs = [`ref="${esc(pageNameById(el.ref))}"`, `x="${r(el.x)}"`, `y="${r(el.y)}"`, `w="${r(el.w)}"`, `h="${r(el.h)}"`];
      } else {
        attrs = [`x="${r(el.x)}"`, `y="${r(el.y)}"`, `w="${r(el.w)}"`, `h="${r(el.h)}"`,
                 `color="${el.color}"`, `opacity="${el.opacity != null ? el.opacity : 1}"`];
        if (el.text) attrs.push(`text="${esc(el.text)}"`);
        if (el.linkTo) attrs.push(`link="${esc(pageNameById(el.linkTo))}"`);
      }
      md += `  <${el.type} ${attrs.join(" ")}/>\n`;
    });
    md += `</screen>\n`;
    md += "```\n\n";

    if (p.memos.length) {
      md += `### 💭 Vibe Memos\n`;
      p.memos.forEach(m => { md += `- \`@(${r(m.x)},${r(m.y)})\` ${(m.text || "").replace(/\n/g, " ").trim() || "(empty)"}\n`; });
      md += "\n";
    }
    const links = p.elements.filter(e => e.linkTo);
    if (links.length) {
      md += `### 🔗 Links\n`;
      links.forEach(e => { md += `- **${e.type}**${e.text ? ` "${e.text}"` : ""} → **${pageNameById(e.linkTo)}**\n`; });
      md += "\n";
    }
  });
  return md;
}

// ---- parse Markdown back into the model / 将 Markdown 解析回模型 ----
function parseMarkdown(md) {
  const proj = { pages: [], activePageId: null, seq: 0 };
  let n = 0;
  const id = (pre) => pre + (++n);
  const linkFix = [], refFix = [];

  const homeM = md.match(/\[HOME:\s*([^\]]*)\]/);
  const homeName = homeM ? homeM[1].trim() : null;

  const parts = md.split(/^##\s+/m).slice(1);
  if (!parts.length) throw new Error("未找到页面 (## 标题) / No pages (## headings) found");

  parts.forEach(part => {
    const nl = part.indexOf("\n");
    let header = (nl >= 0 ? part.slice(0, nl) : part).trim().replace(/\(Home\)\s*$/i, "").trim();
    const bodyTxt = nl >= 0 ? part.slice(nl + 1) : "";
    const page = { id: id("p"), name: header || ("Page " + n), isHome: false, elements: [], memos: [], canvasW: 360, canvasH: 720 };

    const xmlM = bodyTxt.match(/```xml\s*([\s\S]*?)```/);
    if (xmlM) parseScreen(xmlM[1], page, id, linkFix, refFix);

    const memoM = bodyTxt.match(/###[^\n]*Vibe Memos[^\n]*\n([\s\S]*?)(?=\n###|\n```|$)/);
    if (memoM) {
      memoM[1].split("\n").forEach(ln => {
        const mm = ln.match(/^-\s*`?@\((\d+),\s*(\d+)\)`?\s*(.*)$/);
        if (mm) page.memos.push({ id: id("m"), x: +mm[1], y: +mm[2], w: 180, h: 70, text: (mm[3].trim() === "(empty)" ? "" : mm[3].trim()) });
      });
    }
    proj.pages.push(page);
  });

  const byName = (nm) => proj.pages.find(p => p.name === nm);
  linkFix.forEach(({ el, name }) => { const p = byName(name); el.linkTo = p ? p.id : null; });
  refFix.forEach(({ el, name }) => { const p = byName(name); el.ref = p ? p.id : null; });

  // home / 入口
  let home = homeName ? byName(homeName) : null;
  if (!home) home = proj.pages.find(p => p.isHome) || proj.pages[0];
  proj.pages.forEach(p => p.isHome = false);
  if (home) home.isHome = true;

  proj.seq = n;
  proj.activePageId = (home || proj.pages[0]).id;
  return proj;
}

function parseScreen(xml, page, id, linkFix, refFix) {
  const doc = new DOMParser().parseFromString("<root>" + xml + "</root>", "application/xml");
  if (doc.querySelector("parsererror")) throw new Error("XML 解析失败 / XML parse error in " + page.name);
  const screen = doc.querySelector("screen") || doc.documentElement;
  if (screen.getAttribute && screen.getAttribute("width")) page.canvasW = parseInt(screen.getAttribute("width")) || 360;
  if (screen.getAttribute && screen.getAttribute("height")) page.canvasH = parseInt(screen.getAttribute("height")) || 720;
  if (screen.getAttribute && screen.getAttribute("home") === "true") page.isHome = true;

  let note = "";
  screen.childNodes.forEach(node => {
    if (node.nodeType === 8) { note = (node.nodeValue || "").trim(); return; }
    if (node.nodeType !== 1) return;
    const type = node.tagName.toLowerCase();
    const num = (a, d) => { const v = node.getAttribute(a); return v != null && v !== "" ? parseFloat(v) : d; };
    const el = {
      id: id("e"), type,
      x: num("x", 0), y: num("y", 0), w: num("w", 100), h: num("h", 40),
      text: node.getAttribute("text") || "", note,
      color: node.getAttribute("color") || "#ffffff",
      opacity: node.getAttribute("opacity") != null ? parseFloat(node.getAttribute("opacity")) : 1,
      linkTo: null, ref: null,
    };
    const lk = node.getAttribute("link"); if (lk) linkFix.push({ el, name: lk });
    const rf = node.getAttribute("ref"); if (rf) refFix.push({ el, name: rf });
    page.elements.push(el);
    note = "";
  });
}

// ====================================================================
// Code editor / 代码编辑器
// ====================================================================
const codeArea = $("#codeArea");
const codeHl = $("#codeHl").firstElementChild;

function renderCode() {
  codeArea.value = buildMarkdown();
  updateHighlight();
  codeDirty = false;
}
function updateHighlight() {
  codeHl.innerHTML = highlightCode(codeArea.value) + "\n";
  codeHl.parentElement.scrollTop = codeArea.scrollTop;
}
function applyCode() {
  try {
    const proj = parseMarkdown(codeArea.value);
    project = proj;
    migrate();              // fill defaults on the new project / 为新项目补默认值
    selectedId = null; selectedKind = null; codeDirty = false;
    toast("已应用到设计 / Applied to design");
    return true;
  } catch (err) {
    toast("解析失败：" + err.message);
    return false;
  }
}

codeArea.addEventListener("input", () => { codeDirty = true; updateHighlight(); });
codeArea.addEventListener("scroll", () => { codeHl.parentElement.scrollTop = codeArea.scrollTop; codeHl.parentElement.scrollLeft = codeArea.scrollLeft; });
$("#cApply").onclick = () => { if (applyCode()) { setMode("visual"); } };
$("#cRegen").onclick = () => {
  if (codeDirty && !confirm("丢弃代码修改并从设计重新生成？/ Discard edits and regenerate?")) return;
  renderCode(); toast("已重生成 / Regenerated");
};
$("#cCopy").onclick = () => copyText(codeArea.value);
$("#cDownload").onclick = () => { download(new Blob([codeArea.value], { type: "text/markdown" }), "android-ui.md"); toast("已下载 / Downloaded"); };

// lightweight syntax highlighter (XML + Markdown) / 轻量语法高亮
function highlightCode(src) {
  let s = src.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const comments = [];
  s = s.replace(/&lt;!--[\s\S]*?--&gt;/g, (m) => { comments.push(m); return "~~CMT" + (comments.length - 1) + "~~"; });
  // xml tags + attributes
  s = s.replace(/(&lt;\/?)([a-zA-Z][\w-]*)([\s\S]*?)(\/?&gt;)/g, (m, open, name, attrs, close) => {
    const a = attrs.replace(/([\w-]+)(=)("[^"]*"|'[^']*')/g,
      (mm, nm, eq, val) => `<span class="at">${nm}</span>${eq}<span class="vl">${val}</span>`);
    return `<span class="pu">${open}</span><span class="tg">${name}</span>${a}<span class="pu">${close}</span>`;
  });
  // markdown headings & fences
  s = s.replace(/^(#{1,6} .*)$/gm, '<span class="hd">$1</span>');
  s = s.replace(/^(```.*)$/gm, '<span class="fn">$1</span>');
  // restore comments
  s = s.replace(/~~CMT(\d+)~~/g, (m, i) => `<span class="c">${comments[+i]}</span>`);
  return s;
}

function copyText(t) {
  if (navigator.clipboard) navigator.clipboard.writeText(t).then(() => toast("已复制 / Copied"), () => fallbackCopy(t));
  else fallbackCopy(t);
}
function fallbackCopy(t) {
  const ta = document.createElement("textarea");
  ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); } catch (e) {}
  ta.remove(); toast("已复制 / Copied");
}

// ====================================================================
// Keyboard / 键盘
// ====================================================================
document.addEventListener("keydown", (e) => {
  if ((e.key === "Delete" || e.key === "Backspace") && selectedId && mode === "visual" &&
      document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    e.preventDefault(); deleteSelected();
  }
});

// ====================================================================
// Misc / 杂项
// ====================================================================
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}
let toastTimer = null;
function toast(msg) {
  const t = $("#toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

// ====================================================================
// Boot / 启动
// ====================================================================
buildCanvasPresets();
if (!load()) freshProject();
if (!project.pages || !project.pages.length) freshProject();
migrate();
document.querySelector('[data-mode="visual"]').classList.add("active");
render();
